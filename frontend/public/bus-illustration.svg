<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Elements -->
  <circle cx="650" cy="100" r="60" fill="#E0F2FE" opacity="0.5"/>
  <circle cx="150" cy="300" r="40" fill="#DBEAFE" opacity="0.4"/>
  
  <!-- Road -->
  <rect x="0" y="280" width="800" height="120" fill="#F1F5F9"/>
  <rect x="0" y="320" width="800" height="4" fill="#CBD5E1"/>
  
  <!-- Road Lines -->
  <rect x="50" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  <rect x="150" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  <rect x="250" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  <rect x="350" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  <rect x="450" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  <rect x="550" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  <rect x="650" y="338" width="60" height="6" rx="3" fill="#94A3B8"/>
  
  <!-- Bus Body -->
  <g transform="translate(200, 120)">
    <!-- Main Body -->
    <rect x="0" y="40" width="400" height="140" rx="20" fill="url(#busGradient)"/>
    
    <!-- Top Section -->
    <path d="M 20 40 L 20 20 Q 20 10 30 10 L 370 10 Q 380 10 380 20 L 380 40" fill="url(#topGradient)"/>
    
    <!-- Windows -->
    <rect x="20" y="25" width="70" height="50" rx="8" fill="#E0F2FE" opacity="0.9"/>
    <rect x="100" y="25" width="70" height="50" rx="8" fill="#E0F2FE" opacity="0.9"/>
    <rect x="180" y="25" width="70" height="50" rx="8" fill="#E0F2FE" opacity="0.9"/>
    <rect x="260" y="25" width="70" height="50" rx="8" fill="#E0F2FE" opacity="0.9"/>
    
    <!-- Side Windows -->
    <rect x="30" y="90" width="60" height="70" rx="8" fill="#DBEAFE" opacity="0.8"/>
    <rect x="110" y="90" width="60" height="70" rx="8" fill="#DBEAFE" opacity="0.8"/>
    <rect x="190" y="90" width="60" height="70" rx="8" fill="#DBEAFE" opacity="0.8"/>
    <rect x="270" y="90" width="60" height="70" rx="8" fill="#DBEAFE" opacity="0.8"/>
    
    <!-- Door -->
    <rect x="340" y="90" width="45" height="85" rx="6" fill="#1E293B" opacity="0.3"/>
    <rect x="345" y="95" width="35" height="75" rx="4" fill="#334155"/>
    <circle cx="375" cy="132" r="3" fill="#94A3B8"/>
    
    <!-- Headlights -->
    <circle cx="15" cy="60" r="8" fill="#FEF08A"/>
    <circle cx="15" cy="60" r="6" fill="#FBBF24" opacity="0.8"/>
    
    <!-- Brand Name -->
    <text x="200" y="125" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">ABAY BUS</text>
    
    <!-- Decorative Line -->
    <rect x="10" y="165" width="380" height="3" rx="1.5" fill="white" opacity="0.3"/>
    <rect x="10" y="55" width="380" height="2" rx="1" fill="white" opacity="0.2"/>
    
    <!-- Wheels -->
    <g>
      <!-- Front Wheel -->
      <circle cx="80" cy="180" r="28" fill="#1E293B"/>
      <circle cx="80" cy="180" r="22" fill="#334155"/>
      <circle cx="80" cy="180" r="12" fill="#475569"/>
      <circle cx="80" cy="180" r="6" fill="#64748B"/>
      
      <!-- Wheel Spokes -->
      <line x1="80" y1="168" x2="80" y2="192" stroke="#94A3B8" stroke-width="2"/>
      <line x1="68" y1="180" x2="92" y2="180" stroke="#94A3B8" stroke-width="2"/>
      
      <!-- Back Wheel -->
      <circle cx="320" cy="180" r="28" fill="#1E293B"/>
      <circle cx="320" cy="180" r="22" fill="#334155"/>
      <circle cx="320" cy="180" r="12" fill="#475569"/>
      <circle cx="320" cy="180" r="6" fill="#64748B"/>
      
      <!-- Wheel Spokes -->
      <line x1="320" y1="168" x2="320" y2="192" stroke="#94A3B8" stroke-width="2"/>
      <line x1="308" y1="180" x2="332" y2="180" stroke="#94A3B8" stroke-width="2"/>
    </g>
    
    <!-- Side Mirror -->
    <ellipse cx="5" cy="100" rx="8" ry="12" fill="#334155"/>
    <ellipse cx="5" cy="100" rx="6" ry="10" fill="#64748B" opacity="0.6"/>
    
    <!-- Details -->
    <rect x="385" y="60" width="10" height="20" rx="2" fill="#EF4444"/>
    <rect x="385" y="85" width="10" height="20" rx="2" fill="#EF4444"/>
  </g>
  
  <!-- Motion Lines -->
  <line x1="50" y1="200" x2="120" y2="200" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="220" x2="100" y2="220" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="240" x2="130" y2="240" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="busGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
